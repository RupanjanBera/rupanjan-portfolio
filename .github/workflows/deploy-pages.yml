name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prepare static export build
        run: rm -rf src/app/api

      - name: Sync portfolio knowledge for API
        run: node scripts/generate-api-knowledge.mjs

      - name: Build static site
        env:
          STATIC_EXPORT: true
          NEXT_PUBLIC_STATIC_EXPORT: true
          NEXT_PUBLIC_BASE_PATH: /rupanjan-portfolio
          NEXT_PUBLIC_PORTFOLIO_AI_API_URL: ${{ secrets.PORTFOLIO_AI_API_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment